<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Report Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <h1>Flash Report Card</h1>

      <div class="section-label">Header</div>

      <div class="field-group">
        <label for="projectName">Project Name</label>
        <input type="text" id="projectName" placeholder="My Project">
      </div>

      <div class="field-group">
        <label for="date">Date</label>
        <input type="text" id="date">
      </div>

      <div class="field-group">
        <label for="status">Status</label>
        <select id="status">
          <option value="" data-colour="#2dd4bf">— Select status —</option>
          <option value="On Track" data-colour="#22c55e">On Track</option>
          <option value="At Risk" data-colour="#f59e0b">At Risk</option>
          <option value="Off Track" data-colour="#ef4444">Off Track</option>
          <option value="Completed" data-colour="#3b82f6">Completed</option>
          <option value="On Hold" data-colour="#9ca3af">On Hold</option>
        </select>
      </div>

      <div class="section-label">Top Panels</div>

      <div class="field-group">
        <label for="doneSince">Done since last update</label>
        <textarea id="doneSince" rows="5" placeholder="• Completed feature X&#10;• Fixed bug Y"></textarea>
      </div>

      <div class="field-group">
        <label for="doingNow">Doing this week</label>
        <textarea id="doingNow" rows="5" placeholder="• Working on feature Z&#10;• Code review"></textarea>
      </div>

      <div class="field-group">
        <label for="toDoNext">To do next</label>
        <textarea id="toDoNext" rows="5" placeholder="• Deploy to staging&#10;• Update docs"></textarea>
      </div>

      <div class="section-label">Bottom Panels</div>

      <div class="field-group">
        <label for="successes">Notable successes to celebrate</label>
        <textarea id="successes" rows="5" placeholder="• Shipped on time&#10;• Great team collaboration"></textarea>
      </div>

      <div class="field-group">
        <label for="risks">Significant risks to manage</label>
        <textarea id="risks" rows="5" placeholder="• Dependency on external API&#10;• Capacity risk next sprint"></textarea>
      </div>

      <div class="actions">
        <button id="exportBtn" class="btn-primary">Export PNG</button>
        <button id="clearBtn" class="btn-secondary">Clear All</button>
      </div>
    </aside>

    <main class="preview">
      <div class="canvas-wrapper">
        <canvas id="canvas" width="1920" height="1080"></canvas>
      </div>
      <p class="preview-hint">Live preview — edit fields on the left</p>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
